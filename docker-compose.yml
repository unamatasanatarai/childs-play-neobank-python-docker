version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: childspay_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: development_password
      POSTGRES_DB: childspay_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: childspay_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:development_password@db:5432/childspay_ledger
      - JWT_SECRET=super_secret_demo_key
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
