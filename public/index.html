<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child'sPay | Secure Ledger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body {
            padding: 2rem;
        }

        .hidden {
            display: none;
        }

        .ledger-card {
            border-left: 5px solid #2ecc71;
            padding-left: 1rem;
        }
    </style>
</head>

<body>
    <main class="container">
        <hgroup>
            <h1>Child'sPay</h1>
            <h2>High-Integrity Financial Ledger</h2>
        </hgroup>

        <section id="auth-section">
            <article>
                <h3>Login</h3>
                <form id="login-form">
                    <input type="email" id="email" placeholder="user1@example.com" value="user1@example.com" required>
                    <input type="password" id="password" placeholder="password123" value="password123" required>
                    <button type="submit">Access Ledger</button>
                </form>
            </article>
        </section>

        <section id="dashboard-section" class="hidden">
            <div class="grid">
                <article class="ledger-card">
                    <small>Available Balance</small>
                    <h2 id="balance-display">$0.00</h2>
                    <p id="account-number">CHPAY-XXXX</p>
                </article>
                <article>
                    <h3>Execute Transfer</h3>
                    <form id="transfer-form">
                        <label for="recipient_id">Recipient</label>
                        <select id="recipient_id" required>
                            <option value="">Select a recipient...</option>
                        </select>
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="10.50" required>
                        <button type="submit" class="contrast">Send Funds</button>
                    </form>
                </article>
            </div>
            <button onclick="logout()" class="secondary">Logout</button>
        </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
